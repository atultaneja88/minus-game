<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minus Game</title>
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <style>
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <div data-screen="lobby" class="screen active">
        <h1>Lobby</h1>
        <button id="startGame">Start Game</button>
        <!-- Other lobby elements go here -->
    </div>

    <div data-screen="game" class="screen">
        <h1>Game</h1>
        <!-- Game elements go here -->
    </div>

    <script>
        document.getElementById('startGame').addEventListener('click', function() {
            document.querySelector('[data-screen="lobby"]').classList.remove('active');
            document.querySelector('[data-screen="game"]').classList.add('active');
        });
    </script>
</body>
</html>
